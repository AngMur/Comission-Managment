<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Comisiones</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e28;
      --border: #252a38;
      --border-bright: #323848;
      --text: #e8ecf4;
      --text-muted: #6b7594;
      --text-dim: #3d4460;
      --accent: #4f8fff;
      --accent-glow: rgba(79,143,255,0.15);

      --cat1: #f5a623;
      --cat1-bg: rgba(245,166,35,0.08);
      --cat1-border: rgba(245,166,35,0.25);

      --cat2: #e05c5c;
      --cat2-bg: rgba(224,92,92,0.08);
      --cat2-border: rgba(224,92,92,0.25);

      --cat3: #4fc98e;
      --cat3-bg: rgba(79,201,142,0.08);
      --cat3-border: rgba(79,201,142,0.25);

      --cat4: #a78bfa;
      --cat4-bg: rgba(167,139,250,0.08);
      --cat4-border: rgba(167,139,250,0.25);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 32px 24px 60px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 36px;
      gap: 20px;
      flex-wrap: wrap;
    }
    .page-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .page-title span {
      color: var(--accent);
    }
    .page-subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      width: 340px;
      max-width: 100%;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: 10px;
      padding: 11px 14px 11px 42px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── Total banner ── */
    .total-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .total-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(79,143,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .total-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }
    .total-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
    }
    .total-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
    }
    #total-count { transition: all 0.3s ease; }

    /* ── Category cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    @media (max-width: 900px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .cards-grid { grid-template-columns: 1fr; } }

    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      user-select: none;
    }
    .cat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 0 0 14px 14px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .cat-card:hover { transform: translateY(-2px); }
    .cat-card.active { transform: translateY(-2px); }

    .cat-card[data-cat="por-comisionar"] { --c: var(--cat1); --cbg: var(--cat1-bg); --cborder: var(--cat1-border); }
    .cat-card[data-cat="pendientes"]     { --c: var(--cat2); --cbg: var(--cat2-bg); --cborder: var(--cat2-border); }
    .cat-card[data-cat="comisionadas"]   { --c: var(--cat3); --cbg: var(--cat3-bg); --cborder: var(--cat3-border); }
    .cat-card[data-cat="por-regresar"]   { --c: var(--cat4); --cbg: var(--cat4-bg); --cborder: var(--cat4-border); }

    .cat-card:hover, .cat-card.active {
      border-color: var(--cborder);
      box-shadow: 0 0 0 1px var(--cborder), 0 8px 24px rgba(0,0,0,0.3);
      background: var(--cbg);
    }
    .cat-card.active::after { opacity: 1; background: var(--c); }

    .cat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--c);
      box-shadow: 0 0 8px var(--c);
      display: inline-block;
      margin-bottom: 10px;
    }
    .cat-name {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .cat-count {
      font-size: 36px;
      font-weight: 800;
      color: var(--c);
      letter-spacing: -1.5px;
      line-height: 1;
      transition: all 0.3s;
    }
    .cat-badge {
      position: absolute;
      top: 14px; right: 14px;
      width: 22px; height: 22px;
      border-radius: 6px;
      background: var(--cbg);
      border: 1px solid var(--cborder);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .cat-card.active .cat-badge { opacity: 1; }
    .cat-badge svg { color: var(--c); }

    /* ── Table section ── */
    .table-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }
    .table-info {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }
    .table-info strong { color: var(--text); }
    .active-filter-badge {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      padding: 4px 10px 4px 8px;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text-muted);
      cursor: pointer;
    }
    .active-filter-badge.visible { display: flex; }
    .active-filter-badge:hover { border-color: var(--accent); color: var(--text); }
    .filter-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
    }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--surface2);
      padding: 12px 18px;
      text-align: left;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td {
      padding: 13px 18px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      vertical-align: middle;
    }
    tbody td:first-child {
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap;
    }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; }

    .badge-por-comisionar  { background: var(--cat1-bg); color: var(--cat1); border: 1px solid var(--cat1-border); }
    .badge-pendientes      { background: var(--cat2-bg); color: var(--cat2); border: 1px solid var(--cat2-border); }
    .badge-comisionadas    { background: var(--cat3-bg); color: var(--cat3); border: 1px solid var(--cat3-border); }
    .badge-por-regresar    { background: var(--cat4-bg); color: var(--cat4); border: 1px solid var(--cat4-border); }

    .badge-por-comisionar  .badge-dot { background: var(--cat1); }
    .badge-pendientes      .badge-dot { background: var(--cat2); }
    .badge-comisionadas    .badge-dot { background: var(--cat3); }
    .badge-por-regresar    .badge-dot { background: var(--cat4); }

    .etapa-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .n-estatus {
      color: var(--accent);
      font-weight: 600;
    }
    .estatus2-ok   { color: var(--cat3); }
    .estatus2-warn { color: var(--cat1); }
    .estatus2-err  { color: var(--cat2); }

    /* ── Empty state ── */
    .empty-state {
      display: none;
      padding: 60px 20px;
      text-align: center;
    }
    .empty-state.visible { display: block; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty-msg {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<!-- ── Page header ── -->
<div class="page-header">
  <div>
    <div class="page-title">Panel de <span>Comisiones</span></div>
    <div class="page-subtitle">Seguimiento de expedientes · Actualización en tiempo real</div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="search" type="text" placeholder="Buscar ubicación, etapa, estatus…">
  </div>
</div>

<!-- ── Total banner ── -->
<div class="total-banner">
  <div>
    <div class="total-label">Total filtrado</div>
    <div class="total-value" id="total-count">0</div>
  </div>
  <div class="total-desc" id="total-desc">expedientes</div>
</div>

<!-- ── Category cards ── -->
<div class="cards-grid">
  <div class="cat-card" data-cat="por-comisionar">
    <span class="cat-dot"></span>
    <div class="cat-name">Por comisionar</div>
    <div class="cat-count" id="cnt-por-comisionar">0</div>
    <div class="cat-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>
  <div class="cat-card" data-cat="pendientes">
    <span class="cat-dot"></span>
    <div class="cat-name">Pendientes</div>
    <div class="cat-count" id="cnt-pendientes">0</div>
    <div class="cat-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>
  <div class="cat-card" data-cat="comisionadas">
    <span class="cat-dot"></span>
    <div class="cat-name">Comisionadas</div>
    <div class="cat-count" id="cnt-comisionadas">0</div>
    <div class="cat-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>
  <div class="cat-card" data-cat="por-regresar">
    <span class="cat-dot"></span>
    <div class="cat-name">Por regresar</div>
    <div class="cat-count" id="cnt-por-regresar">0</div>
    <div class="cat-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>
</div>

<!-- ── Table ── -->
<div class="table-section">
  <div class="table-toolbar">
    <div class="table-info">Mostrando <strong id="row-count">0</strong> registros</div>
    <div class="active-filter-badge" id="filter-badge">
      <span class="filter-dot"></span>
      <span id="filter-label">Todos</span>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Ubicación</th>
          <th>Etapa</th>
          <th>Estatus</th>
          <th>N Estatus</th>
          <th>Estatus 2</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">◎</div>
      <div class="empty-msg">Sin resultados para la búsqueda actual</div>
    </div>
  </div>
</div>

<script>
  // ── Data ──────────────────────────────────────────────────────────────────
  const DATA = [
    { ubicacion: "Monterrey Norte",   etapa: "Etapa 1", estatus: "por-comisionar", nEstatus: "N-001", estatus2: "ok"   },
    { ubicacion: "Guadalajara Sur",   etapa: "Etapa 2", estatus: "pendientes",     nEstatus: "N-002", estatus2: "warn" },
    { ubicacion: "CDMX Centro",       etapa: "Etapa 1", estatus: "comisionadas",   nEstatus: "N-003", estatus2: "ok"   },
    { ubicacion: "Puebla Oriente",    etapa: "Etapa 3", estatus: "por-regresar",   nEstatus: "N-004", estatus2: "err"  },
    { ubicacion: "Querétaro Norte",   etapa: "Etapa 2", estatus: "por-comisionar", nEstatus: "N-005", estatus2: "warn" },
    { ubicacion: "León Centro",       etapa: "Etapa 1", estatus: "pendientes",     nEstatus: "N-006", estatus2: "ok"   },
    { ubicacion: "Tijuana Oeste",     etapa: "Etapa 4", estatus: "comisionadas",   nEstatus: "N-007", estatus2: "ok"   },
    { ubicacion: "Mérida Sur",        etapa: "Etapa 2", estatus: "por-regresar",   nEstatus: "N-008", estatus2: "warn" },
    { ubicacion: "Cancún Zona Hotel", etapa: "Etapa 3", estatus: "por-comisionar", nEstatus: "N-009", estatus2: "ok"   },
    { ubicacion: "Veracruz Puerto",   etapa: "Etapa 1", estatus: "pendientes",     nEstatus: "N-010", estatus2: "err"  },
    { ubicacion: "San Luis Potosí",   etapa: "Etapa 2", estatus: "comisionadas",   nEstatus: "N-011", estatus2: "ok"   },
    { ubicacion: "Chihuahua Norte",   etapa: "Etapa 1", estatus: "por-regresar",   nEstatus: "N-012", estatus2: "warn" },
    { ubicacion: "Culiacán Centro",   etapa: "Etapa 3", estatus: "por-comisionar", nEstatus: "N-013", estatus2: "ok"   },
    { ubicacion: "Hermosillo Ote.",   etapa: "Etapa 2", estatus: "comisionadas",   nEstatus: "N-014", estatus2: "ok"   },
    { ubicacion: "Toluca Sur",        etapa: "Etapa 4", estatus: "pendientes",     nEstatus: "N-015", estatus2: "err"  },
  ];

  const catLabels = {
    "por-comisionar": "Por comisionar",
    "pendientes":     "Pendientes",
    "comisionadas":   "Comisionadas",
    "por-regresar":   "Por regresar"
  };

  const estatus2Labels = { ok: "Completo", warn: "En revisión", err: "Con error" };

  // ── State ─────────────────────────────────────────────────────────────────
  let activeCategory = null;
  let searchQuery    = "";

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const tbody       = document.getElementById("table-body");
  const emptyState  = document.getElementById("empty-state");
  const rowCount    = document.getElementById("row-count");
  const totalCount  = document.getElementById("total-count");
  const totalDesc   = document.getElementById("total-desc");
  const filterBadge = document.getElementById("filter-badge");
  const filterLabel = document.getElementById("filter-label");
  const searchEl    = document.getElementById("search");

  // ── Render ────────────────────────────────────────────────────────────────
  function getFiltered() {
    return DATA.filter(row => {
      const matchCat    = !activeCategory || row.estatus === activeCategory;
      const q           = searchQuery.toLowerCase();
      const matchSearch = !q || [row.ubicacion, row.etapa, row.estatus, row.nEstatus].some(v => v.toLowerCase().includes(q));
      return matchCat && matchSearch;
    });
  }

  function render() {
    const filtered = getFiltered();

    // counts per category from filtered set
    const counts = { "por-comisionar": 0, "pendientes": 0, "comisionadas": 0, "por-regresar": 0 };
    filtered.forEach(r => counts[r.estatus]++);

    // update cards
    Object.keys(counts).forEach(cat => {
      document.getElementById("cnt-" + cat).textContent = counts[cat];
    });

    // total
    totalCount.textContent = filtered.length;
    totalDesc.textContent  = filtered.length === 1 ? "expediente" : "expedientes";
    rowCount.textContent   = filtered.length;

    // filter badge
    if (activeCategory) {
      filterBadge.classList.add("visible");
      filterLabel.textContent = catLabels[activeCategory];
    } else {
      filterBadge.classList.remove("visible");
    }

    // table rows
    tbody.innerHTML = "";
    if (filtered.length === 0) {
      emptyState.classList.add("visible");
    } else {
      emptyState.classList.remove("visible");
      filtered.forEach(row => {
        const tr = document.createElement("tr");
        const e2class = { ok: "estatus2-ok", warn: "estatus2-warn", err: "estatus2-err" }[row.estatus2] || "";
        tr.innerHTML = `
          <td>${row.ubicacion}</td>
          <td><span class="etapa-tag">${row.etapa}</span></td>
          <td>
            <span class="badge badge-${row.estatus}">
              <span class="badge-dot"></span>${catLabels[row.estatus]}
            </span>
          </td>
          <td class="n-estatus">${row.nEstatus}</td>
          <td class="${e2class}">${estatus2Labels[row.estatus2]}</td>
        `;
        tbody.appendChild(tr);
      });
    }
  }

  // ── Category filter toggle ────────────────────────────────────────────────
  document.querySelectorAll(".cat-card").forEach(card => {
    card.addEventListener("click", () => {
      const cat = card.dataset.cat;
      if (activeCategory === cat) {
        activeCategory = null;
        card.classList.remove("active");
      } else {
        activeCategory = cat;
        document.querySelectorAll(".cat-card").forEach(c => c.classList.remove("active"));
        card.classList.add("active");
      }
      render();
    });
  });

  // ── Clear filter badge ────────────────────────────────────────────────────
  filterBadge.addEventListener("click", () => {
    activeCategory = null;
    document.querySelectorAll(".cat-card").forEach(c => c.classList.remove("active"));
    render();
  });

  // ── Search ────────────────────────────────────────────────────────────────
  searchEl.addEventListener("input", e => {
    searchQuery = e.target.value;
    render();
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
