<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Proyectos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="panel-filtros">
        <div class="encabezado">
            <span> PROYECTOS </span> <span class="titulo">FILTROS</span>
        </div>
        
        <div class="cuerpo-filtros">
            <div class="grupo-filtro">
                <label>COMPAÑÍA</label>
                <select id="filtro-compania">
                    <option value="">Todas las compañías</option>
                    <option value="Empresa A">Empresa A</option>
                    <option value="Empresa B">Empresa B</option>
                    <option value="Empresa C">Empresa C</option>
                </select>
            </div>

            <div class="grupo-filtro">
                <label>DESARROLLO</label>
                <select id="filtro-desarrollo">
                    <option value="">Todos los desarrollos</option>
                    <option value="Residencial">Residencial</option>
                    <option value="Comercial">Comercial</option>
                    <option value="Industrial">Industrial</option>
                </select>
            </div>

            <div class="grupo-filtro">
                <label>UBICACIÓN</label>
                <select id="filtro-ubicacion">
                    <option value="">Todas las ubicaciones</option>
                    <option value="Norte">Norte</option>
                    <option value="Sur">Sur</option>
                    <option value="Centro">Centro</option>
                </select>
            </div>
        </div>
    </div>

    <div id="contenedor-resultados" class="resultados-grid"></div>

    <script src="script.js"></script>
</body>
</html>
