<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comisiones Activas - Commify</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,700;0,800;1,700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:          #0e1117;
    --surface:     #161b26;
    --surface2:    #1c2333;
    --border:      rgba(255,255,255,0.06);
    --border-hover:rgba(120,200,140,0.3);

    --accent:      #6fcf97;
    --accent2:     #27ae60;
    --accent-glow: rgba(111,207,151,0.12);

    --text-1: #e8edf5;
    --text-2: #8a96a8;
    --text-3: #4e5a6a;

    --gold:   #f0c060;
    --blue:   #5ba3d9;
    --purple: #9b7fd4;
    --orange: #e8915a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Roboto', sans-serif;
    background: var(--bg);
    color: var(--text-1);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid pattern background */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background:
      linear-gradient(135deg, #0e1117 0%, #111620 60%, #0d1520 100%);
    z-index:-2;
  }

  body::after {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(111,207,151,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(91,163,217,0.04) 0%, transparent 50%);
    z-index:-1;
    pointer-events:none;
  }

  /* ── LOADER ────────────────────────────────────────────── */
  .loader-container {
    position:fixed; inset:0;
    background: var(--bg);
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    z-index:9999;
    animation: fadeOut 0.5s ease-out 1.4s forwards;
  }

  .loader-ring {
    width:52px; height:52px;
    border-radius:50%;
    border:2px solid rgba(111,207,151,0.15);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
    margin-bottom:18px;
  }

  .loader-text {
    font-family:'Montserrat', sans-serif;
    font-size:1.1rem;
    color: var(--accent);
    letter-spacing:0.05em;
    opacity:0.8;
  }

  @keyframes spin    { to { transform:rotate(360deg); } }
  @keyframes fadeOut { to { opacity:0; visibility:hidden; pointer-events:none; } }
  @keyframes slideUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
  @keyframes shimmer { from { opacity:0.5; } to { opacity:1; } }

  /* ── DASHBOARD ─────────────────────────────────────────── */
  .dashboard {
    padding: 48px 36px;
    max-width: 1360px;
    margin: 0 auto;
    opacity:0;
    animation: slideUp 0.6s ease-out 1.6s forwards;
  }

  /* ── HEADER ────────────────────────────────────────────── */
  .header-wrap {
    text-align:center;
    margin-bottom:52px;
  }

  .header-badge {
    display:inline-flex;
    align-items:center;
    gap:8px;
    background: rgba(111,207,151,0.1);
    border:1px solid rgba(111,207,151,0.25);
    color: var(--accent);
    padding:6px 18px;
    border-radius:999px;
    font-size:0.7rem;
    font-weight:600;
    letter-spacing:0.15em;
    text-transform:uppercase;
    margin-bottom:18px;
  }

  .header-badge::before {
    content:'';
    width:6px; height:6px;
    border-radius:50%;
    background:var(--accent);
    animation: shimmer 1.4s ease-in-out infinite alternate;
  }

  .header-title {
    font-family:'Montserrat', sans-serif;
    font-size:2.6rem;
    font-weight:700;
    color: var(--text-1);
    letter-spacing:-0.02em;
    line-height:1.15;
    margin-bottom:10px;
  }

  .header-title em {
    font-style:italic;
    color: var(--accent);
  }

  .header-date {
    color: var(--text-3);
    font-size:0.82rem;
    font-weight:400;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    letter-spacing:0.02em;
  }

  .header-date i { color: var(--accent); font-size:0.75rem; }

  /* ── CONTROLS ──────────────────────────────────────────── */
  .controls-row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:28px;
  }

  .filters-bar { display:flex; gap:6px; flex-wrap:wrap; }

  .filter-btn {
    padding:8px 20px;
    border-radius:999px;
    border:1px solid var(--border);
    background: transparent;
    color: var(--text-3);
    font-size:0.78rem;
    font-weight:500;
    font-family:'Roboto', sans-serif;
    transition:all 0.22s ease;
    letter-spacing:0.03em;
  }

  .filter-btn:hover {
    border-color: rgba(111,207,151,0.35);
    color: var(--accent);
    background: var(--accent-glow);
  }

  .filter-btn.active {
    background: rgba(111,207,151,0.14);
    border-color: rgba(111,207,151,0.45);
    color: var(--accent);
    font-weight:600;
  }

  .search-wrap {
    display:flex;
    align-items:center;
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px 16px;
    gap:10px;
    transition:all 0.25s;
    min-width:240px;
  }

  .search-wrap:focus-within {
    border-color: rgba(111,207,151,0.4);
    box-shadow:0 0 0 3px rgba(111,207,151,0.07);
  }

  .search-wrap input {
    background:none; border:none; color:var(--text-1);
    outline:none; font-size:0.85rem; width:100%;
    font-family:'Roboto', sans-serif;
  }

  .search-wrap input::placeholder { color: var(--text-3); }
  .search-wrap i { color: var(--text-3); font-size:0.8rem; }

  /* ── COMMISSION LIST ───────────────────────────────────── */
  .commissions-list {
    display:flex; flex-direction:column; gap:12px;
  }

  /* ── CARD ──────────────────────────────────────────────── */
  .commission-card {
    background: var(--surface);
    border-radius:18px;
    border:1px solid var(--border);
    overflow:hidden;
    transition:border-color 0.28s, box-shadow 0.28s;
    animation: slideUp 0.4s ease both;
  }

  .commission-card:hover {
    border-color: rgba(111,207,151,0.2);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .commission-card.open {
    border-color: rgba(111,207,151,0.38);
    box-shadow: 0 8px 36px rgba(111,207,151,0.07), 0 2px 12px rgba(0,0,0,0.4);
  }

  .card-header {
    padding:22px 28px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:20px;
    user-select:none;
    transition:background 0.2s;
  }

  .card-header:hover { background: rgba(255,255,255,0.015); }

  .card-info-grid {
    flex:1;
    display:grid;
    grid-template-columns: 2.2fr 1.4fr 1.1fr 1.1fr 1.2fr 1fr;
    gap:18px;
    align-items:center;
  }

  .info-block label {
    display:block;
    font-size:0.62rem;
    color: var(--text-3);
    text-transform:uppercase;
    letter-spacing:0.1em;
    margin-bottom:6px;
    font-weight:600;
  }

  .info-block span { font-size:0.86rem; color:var(--text-2); font-weight:500; }

  .desarrollo-name {
    font-family:'Montserrat', sans-serif;
    font-size:0.96rem;
    font-weight:600;
    color: var(--text-1);
    line-height:1.3;
    letter-spacing:-0.01em;
  }

  .company-name {
    font-size:0.72rem;
    color: var(--text-3);
    margin-top:4px;
    font-weight:400;
  }

  .price-text {
    font-size:0.9rem !important;
    font-weight:600 !important;
    color: var(--text-1) !important;
    letter-spacing:-0.01em;
  }

  .commission-text {
    font-size:0.9rem !important;
    font-weight:700 !important;
    color: var(--accent) !important;
  }

  /* Clave */
  .clave-text {
    font-family:'Courier New', monospace;
    font-size:0.78rem !important;
    color: var(--accent) !important;
    font-weight:600 !important;
    background: rgba(111,207,151,0.08);
    border:1px solid rgba(111,207,151,0.18);
    padding:3px 9px;
    border-radius:7px;
    display:inline-block;
    letter-spacing:0.03em;
  }

  /* ── BADGES ────────────────────────────────────────────── */
  .badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 11px;
    border-radius:999px;
    font-size:0.67rem;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.06em;
    white-space:nowrap;
  }

  .badge-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }

  .badge-activa    { background:rgba(111,207,151,0.12); color:var(--accent);  border:1px solid rgba(111,207,151,0.25); }
  .badge-activa .badge-dot    { background:var(--accent); }
  .badge-verificada{ background:rgba(91,163,217,0.12);  color:var(--blue);    border:1px solid rgba(91,163,217,0.25); }
  .badge-verificada .badge-dot{ background:var(--blue); }
  .badge-aprobada  { background:rgba(240,192,96,0.12);  color:var(--gold);    border:1px solid rgba(240,192,96,0.25); }
  .badge-aprobada .badge-dot  { background:var(--gold); }
  .badge-pagada    { background:rgba(39,174,96,0.12);   color:#4cd98a;        border:1px solid rgba(39,174,96,0.25); }
  .badge-pagada .badge-dot    { background:#4cd98a; }

  .badge-tipo { font-size:0.65rem; padding:4px 10px; }
  .badge-tradicional { background:rgba(155,127,212,0.12); color:var(--purple); border:1px solid rgba(155,127,212,0.22); }
  .badge-compartida  { background:rgba(91,163,217,0.12);  color:var(--blue);   border:1px solid rgba(91,163,217,0.22); }
  .badge-multipunto  { background:rgba(232,145,90,0.12);  color:var(--orange); border:1px solid rgba(232,145,90,0.22); }

  /* ── TOGGLE ────────────────────────────────────────────── */
  .card-toggle {
    display:flex; flex-direction:column;
    align-items:center; gap:5px;
    flex-shrink:0;
  }

  .chevron {
    width:32px; height:32px;
    border-radius:9px;
    background:var(--surface2);
    border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    color:var(--text-3);
    font-size:0.72rem;
    transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  .commission-card.open .chevron {
    transform:rotate(180deg);
    background:rgba(111,207,151,0.14);
    border-color:rgba(111,207,151,0.35);
    color:var(--accent);
  }

  .toggle-label {
    font-size:0.62rem;
    color: var(--text-3);
    letter-spacing:0.04em;
    white-space:nowrap;
  }

  /* ── DIVIDER ───────────────────────────────────────────── */
  .card-divider {
    height:1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin:0 28px;
  }

  /* ── PARTICIPANTS PANEL ────────────────────────────────── */
  .participants-panel {
    max-height:0; overflow:hidden;
    transition:max-height 0.42s cubic-bezier(0.4,0,0.2,1);
  }

  .commission-card.open .participants-panel { max-height:700px; }

  .participants-inner { padding:20px 28px 28px; }

  .participants-title {
    font-size:0.64rem;
    color: var(--accent);
    text-transform:uppercase;
    letter-spacing:0.14em;
    font-weight:700;
    margin-bottom:16px;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .participants-title i { font-size:0.65rem; }

  .participants-title::after {
    content:''; flex:1; height:1px;
    background:linear-gradient(90deg, rgba(111,207,151,0.2), transparent);
  }

  .participants-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(295px, 1fr));
    gap:10px;
  }

  .participant-row {
    display:flex;
    align-items:center;
    gap:13px;
    padding:14px 16px;
    background: var(--surface2);
    border:1px solid var(--border);
    border-radius:14px;
    transition:all 0.22s;
  }

  .participant-row:hover {
    background: rgba(111,207,151,0.06);
    border-color: rgba(111,207,151,0.22);
    transform:translateX(2px);
  }

  .participant-avatar {
    width:40px; height:40px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid rgba(111,207,151,0.3);
    flex-shrink:0;
  }

  .participant-avatar-fallback {
    width:40px; height:40px;
    border-radius:50%;
    background:linear-gradient(135deg, rgba(111,207,151,0.25), rgba(39,174,96,0.2));
    border:2px solid rgba(111,207,151,0.3);
    display:flex; align-items:center; justify-content:center;
    font-size:0.83rem; font-weight:700;
    color: var(--accent);
    flex-shrink:0;
    letter-spacing:-0.02em;
  }

  .participant-info { flex:1; min-width:0; }

  .participant-name {
    font-size:0.85rem;
    font-weight:600;
    color: var(--text-1);
    display:flex; align-items:center;
    gap:7px; flex-wrap:wrap;
    line-height:1.3;
  }

  .rol-tag {
    padding:2px 8px;
    border-radius:6px;
    font-size:0.58rem;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
  }

  .rol-gerente { background:rgba(111,207,151,0.15); color:var(--accent); }
  .rol-asesor  { background:rgba(91,163,217,0.15);  color:var(--blue);  }
  .rol-otro    { background:rgba(155,127,212,0.15); color:var(--purple);}

  .participant-sub {
    font-size:0.7rem;
    color: var(--text-3);
    margin-top:3px;
  }

  .participant-numbers { text-align:right; flex-shrink:0; }

  .participant-monto {
    font-size:0.9rem;
    font-weight:700;
    color: var(--accent);
    letter-spacing:-0.01em;
  }

  .participant-pct {
    font-size:0.65rem;
    color: var(--text-3);
    margin-top:2px;
  }

  /* ── PAIR GROUPS ───────────────────────────────────────── */
  .pair-group { margin-bottom:14px; }
  .pair-group:last-child { margin-bottom:0; }

  .pair-label {
    font-size:0.64rem;
    color: var(--text-3);
    text-transform:uppercase;
    letter-spacing:0.09em;
    font-weight:600;
    display:flex; align-items:center;
    gap:6px; margin-bottom:9px;
    padding-left:2px;
  }

  .pair-label i { font-size:0.6rem; }

  .pair-multipunto {
    background: rgba(232,145,90,0.04);
    border:1px solid rgba(232,145,90,0.15);
    border-radius:14px;
    padding:14px;
    margin-bottom:14px;
  }

  .pair-label-multipunto { color:var(--orange); }

  .multipunto-tag {
    display:inline-block;
    background:rgba(232,145,90,0.18);
    color:var(--orange);
    border:1px solid rgba(232,145,90,0.3);
    padding:1px 8px;
    border-radius:999px;
    font-size:0.57rem;
    font-weight:700;
    letter-spacing:0.07em;
    text-transform:uppercase;
  }

  /* ── EMPTY ─────────────────────────────────────────────── */
  .empty-state {
    text-align:center;
    padding:80px 20px;
    color: var(--text-3);
  }

  .empty-state i {
    font-size:2.4rem;
    margin-bottom:16px;
    display:block;
    opacity:0.4;
  }

  .empty-state p { font-size:0.88rem; }

  /* ── RESPONSIVE ────────────────────────────────────────── */
  @media (max-width:1100px) {
    .card-info-grid { grid-template-columns:2fr 1.4fr 1fr 1fr; }
    .hide-md { display:none !important; }
  }

  @media (max-width:768px) {
    .dashboard { padding:28px 18px; }
    .header-title { font-size:2rem; }
    .card-info-grid { grid-template-columns:1fr 1fr; gap:12px; }
    .hide-sm { display:none !important; }
    .participants-grid { grid-template-columns:1fr; }
    .card-header { padding:18px 20px; }
    .participants-inner { padding:16px 20px 22px; }
  }

  @media (max-width:520px) {
    .card-info-grid { grid-template-columns:1fr; }
    .controls-row { flex-direction:column; align-items:stretch; }
    .search-wrap { min-width:0; }
  }
</style>
</head>
<body>

  <div class="loader-ring"></div>
  <div class="loader-text">Commify</div>
</div>

      <input type="text" id="searchInput" placeholder="Buscar desarrollo, asesor…">

  <div class="commissions-list" id="commissionsList"></div>
</div>

const fmt  = v => v.toLocaleString('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0});
const initials = n => n.split(' ').slice(0,2).map(w=>w[0].toUpperCase()).join('');
const totalComision = item => item.precio_venta*(item.participantes.reduce((s,p)=>s+p.porcentaje,0)/100);

function tipoBadge(tipo){
  const map={
    'Tradicional':{cls:'badge-tradicional',icon:'fa-handshake'},
    'Compartida':{cls:'badge-compartida',icon:'fa-share-nodes'},
    'Multipunto':{cls:'badge-multipunto',icon:'fa-location-dot'},
  };
  const t=map[tipo]||{cls:'badge-compartida',icon:'fa-tag'};
  return `<span class="badge badge-tipo ${t.cls}"><i class="fas ${t.icon}" style="font-size:.58rem"></i>${tipo}</span>`;
}

function statusBadge(status){
  const map={
    activa:    {cls:'badge-activa',    label:'Activa'},
    verificada:{cls:'badge-verificada',label:'Verificada'},
    aprobada:  {cls:'badge-aprobada',  label:'Aprobada'},
    pagada:    {cls:'badge-pagada',    label:'Pagada'},
  };
  const s=map[status]||{cls:'badge-activa',label:status};
  return `<span class="badge ${s.cls}"><span class="badge-dot"></span>${s.label}</span>`;
}

function rolClass(rol){
  if(rol.toLowerCase().includes('gerente')) return 'rol-gerente';
  if(rol.toLowerCase().includes('asesor'))  return 'rol-asesor';
  return 'rol-otro';
}

function avatarHTML(p){
  const inits=initials(p.nombre);
  if(p.imagen){
    return `<img class="participant-avatar" src="${p.imagen}" alt="${p.nombre}"
      onerror="this.outerHTML='<div class=\\'participant-avatar-fallback\\'>${inits}</div>'">`;
  }
  return `<div class="participant-avatar-fallback">${inits}</div>`;
}

function buildPairsHTML(item){
  const ps=item.participantes;
  const tipo=item.tipo_comision;
  let html='';

  if(tipo==='Tradicional'){
    html=ps.map(p=>participantRowHTML(p,item.precio_venta)).join('');
    return `<div class="participants-grid">${html}</div>`;
  }

  if(tipo==='Compartida'){
    const pairs=[];
    for(let i=0;i<ps.length;i+=2) pairs.push(ps.slice(i,i+2));
    html=pairs.map((pair,idx)=>`
      <div class="pair-group">
        <div class="pair-label"><i class="fas fa-user-group"></i> Pareja ${idx+1}</div>
        <div class="participants-grid">${pair.map(p=>participantRowHTML(p,item.precio_venta)).join('')}</div>
      </div>`).join('');
    return html;
  }

  if(tipo==='Multipunto'){
    const pairs=[];
    for(let i=0;i<ps.length;i+=2) pairs.push(ps.slice(i,i+2));
    html=pairs.map((pair,idx)=>`
      <div class="pair-group ${idx===0?'pair-multipunto':''}">
        <div class="pair-label ${idx===0?'pair-label-multipunto':''}">
          ${idx===0
            ?`<i class="fas fa-location-dot"></i> Multipunto <span class="multipunto-tag">Origen</span>`
            :`<i class="fas fa-user-group"></i> Pareja ${idx+1}`}
        </div>
        <div class="participants-grid">${pair.map(p=>participantRowHTML(p,item.precio_venta)).join('')}</div>
      </div>`).join('');
    return html;
  }

  return `<div class="participants-grid">${ps.map(p=>participantRowHTML(p,item.precio_venta)).join('')}</div>`;
}

function participantRowHTML(p,precioVenta){
  const monto=precioVenta*(p.porcentaje/100);
  return `
  <div class="participant-row">
    ${avatarHTML(p)}
    <div class="participant-info">
      <div class="participant-name">
        ${p.nombre}
        <span class="rol-tag ${rolClass(p.rol)}">${p.rol}</span>
      </div>
      <div class="participant-sub">${p.porcentaje}% de comisión sobre la venta</div>
    </div>
    <div class="participant-numbers">
      <div class="participant-monto">${fmt(monto)}</div>
      <div class="participant-pct">Ganancia estimada</div>
    </div>
  </div>`;
}

function renderCard(item,idx){
  const comTotal=totalComision(item);
  const delay=idx*0.05;
  return `
  <div class="commission-card" data-id="${item.id}" data-status="${item.status}" style="animation-delay:${delay}s">
    <div class="card-header" onclick="toggleCard(${item.id})">
      <div class="card-info-grid">
        <div class="info-block">
          <label><i class="fas fa-building" style="margin-right:3px"></i>Desarrollo</label>
          <div class="desarrollo-name">${item.desarrollo}</div>
          <div class="company-name">${item.compania}</div>
        </div>
        <div class="info-block hide-sm">
          <label><i class="fas fa-key" style="margin-right:3px"></i>Clave</label>
          <span class="clave-text">${item.ubicacion}</span>
        </div>
        <div class="info-block hide-sm">
          <label>Tipo</label>
          ${tipoBadge(item.tipo_comision)}
        </div>
        <div class="info-block">
          <label>Precio de Venta</label>
          <span class="price-text">${fmt(item.precio_venta)}</span>
        </div>
        <div class="info-block hide-md">
          <label>Comisión Total</label>
          <span class="commission-text">${fmt(comTotal)}</span>
        </div>
        <div class="info-block">
          <label>Estatus</label>
          ${statusBadge(item.status)}
        </div>
      </div>
      <div class="card-toggle">
        <div class="chevron"><i class="fas fa-chevron-down"></i></div>
        <span class="toggle-label">${item.participantes.length} participantes</span>
      </div>
    </div>
    <div class="card-divider"></div>
    <div class="participants-panel">
      <div class="participants-inner">
        <div class="participants-title">
          <i class="fas fa-users"></i>
          Equipo de Venta
        </div>
        ${buildPairsHTML(item)}
      </div>
    </div>
  </div>`;
}

function toggleCard(id){
  document.querySelector(`.commission-card[data-id="${id}"]`).classList.toggle('open');
}

let allData=[], filtro='todas', query='';

function renderList(){
  let filtered=allData;
  if(filtro!=='todas') filtered=filtered.filter(d=>d.status===filtro);
  if(query){
    const q=query.toLowerCase();
    filtered=filtered.filter(d=>
      d.desarrollo.toLowerCase().includes(q)||
      d.compania.toLowerCase().includes(q)||
      d.ubicacion.toLowerCase().includes(q)||
      d.participantes.some(p=>p.nombre.toLowerCase().includes(q))
    );
  }
  const list=document.getElementById('commissionsList');
  if(!filtered.length){
    list.innerHTML=`<div class="empty-state"><i class="fas fa-folder-open"></i><p>No se encontraron comisiones</p></div>`;
    return;
  }
  list.innerHTML=filtered.map((item,i)=>renderCard(item,i)).join('');
}

document.getElementById('filtersBar').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filtro=btn.dataset.filter;
  renderList();
});

document.getElementById('searchInput').addEventListener('input',e=>{
  query=e.target.value.trim();
  renderList();
});

async function init(){
  document.getElementById('currentDate').textContent=new Date().toLocaleDateString('es-MX',{
    weekday:'long',year:'numeric',month:'long',day:'numeric'
  });
  allData=await new Promise(res=>setTimeout(()=>res(COMMISSIONS_DATA),1100));
  renderList();
}

init();
</script>
